<!DOCTYPE html>
<html lang="ko">
<head>
    <link rel="manifest" href="./manifest.json">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UPI 거래 테스트 매니저 v2.6</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <style>
        :root { 
            --upi-blue: #00338D;   /* 로고 속 남색 */
            --upi-red: #C8102E;    /* 로고 속 빨간색 */
            --upi-teal: #008077;   /* 로고 속 청록색 */
            --upi-grad: linear-gradient(135deg, #00338D 0%, #0056b3 100%);
            --gray: #ececec; 
        }
        body { font-family: 'Pretendard', -apple-system, sans-serif; background: #f0f2f5; padding: 20px; display: flex; justify-content: center; margin: 0; }
        .app-container { width: 100%; max-width: 450px; background: white; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); padding: 25px; margin-bottom: 50px;}
        
        .header-area { display: flex; align-items: center; justify-content: center; gap: 10px; margin-bottom: 25px; border-bottom: 2px solid #eee; padding-bottom: 15px; }
        .header-logo { height: 28px; width: auto; }
        h2 { margin: 0; color: #000; font-size: 22px; font-weight: 800; }
        
        .section-label { font-size: 14px; color: #555; font-weight: bold; margin: 20px 0 10px; padding-left: 10px; border-left: 4px solid var(--upi-blue); }
        
        .input-group { margin-bottom: 15px; position: relative; }
        label { display: block; margin-bottom: 6px; font-size: 14px; font-weight: 600; }
        input, textarea, select { width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 10px; box-sizing: border-box; font-size: 15px; background: #fafafa; font-family: inherit; }
        
        .amount-wrapper { position: relative; display: flex; align-items: center; }
        .amount-wrapper input { padding-right: 35px; text-align: right; }
        .amount-unit { position: absolute; right: 12px; font-weight: bold; color: #333; pointer-events: none; }

        textarea { height: 80px; resize: none; }
        input:focus, textarea:focus, select:focus { outline: none; border-color: var(--upi-blue); background: white; }

        .record-tabs { display: flex; align-items: center; gap: 8px; margin: 15px 0; overflow-x: auto; padding-bottom: 10px; }
        .tab-btn { width: 45px; height: 45px; flex: 0 0 auto; border-radius: 50%; border: 1px solid #ddd; background: white; cursor: pointer; font-size: 15px; font-weight: bold; display: flex; align-items: center; justify-content: center; }
        .tab-btn.active { background: var(--upi-blue); color: white; border-color: var(--upi-blue); }
        
        .add-tab { font-size: 28px; color: var(--upi-teal); cursor: pointer; border: none; background: none; font-weight: bold; padding: 0 10px; }

        .button-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 10px; }
        .button-grid.triple { grid-template-columns: 1fr 1fr 1fr; }
        button.item { padding: 14px 5px; border: none; border-radius: 12px; background: var(--gray); cursor: pointer; font-size: 13px; font-weight: 600; color: #444; transition: all 0.2s; }
        button.item.selected { background: var(--upi-grad); color: white; transform: translateY(-2px); }

        .toggle-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
        .toggle-row { 
            display: flex; justify-content: space-between; align-items: center; 
            padding: 10px 8px; background: #f8f9fa; border-radius: 10px; 
            border: 1px solid #eee; 
        }
        .toggle-row span { font-size: 12px; font-weight: 600; color: #444; word-break: keep-all; line-height: 1.2; }
        .toggle-btn { width: 40px; height: 28px; border-radius: 14px; border: none; background: #ccc; font-weight: bold; cursor: pointer; color: white; transition: 0.3s; font-size: 12px; flex-shrink: 0; }
        .toggle-btn.active { background: var(--upi-teal); }

        .card-list-item { display: flex; justify-content: space-between; align-items: center; padding: 10px 0; border-bottom: 1px solid #eee; }
        .card-list-item span { font-size: 14px; color: #444; }
        .card-select { width: 60% !important; padding: 8px !important; font-size: 13px !important; }

        .submit-area { margin-top: 30px; }
        .submit-btn { width: 100%; padding: 18px; background: var(--upi-teal); color: white; border: none; border-radius: 15px; font-size: 18px; font-weight: bold; cursor: pointer; }

        /* 결과 요약 전용 스타일 추가 */
        .summary-row { display: flex; justify-content: space-between; align-items: center; padding: 10px 0; border-bottom: 1px dotted #ddd; font-size: 14px; }
        .summary-row b { color: var(--upi-blue); flex-shrink: 0; }
        .summary-row span { text-align: right; color: #333; font-weight: 500; }
        .result-card { background: #f9f9f9; border-radius: 12px; padding: 15px; margin-top: 15px; border: 1px solid #eee; }
        .summary-tabs { display: flex; gap: 5px; overflow-x: auto; padding: 10px 0; margin-bottom: 10px; }
    </style>
</head>
<body>

<div class="app-container">
    <div class="header-area">
        <img src="Logo.png" alt="UPI" class="header-logo">
        <h2>거래 테스트 기록</h2>
    </div>

    <div class="input-group">
        <label>가맹점명</label>
        <input type="text" id="storeName" placeholder="테스트 가맹점을 입력하세요">
    </div>
    <div class="input-group">
        <label>테스트 일시</label>
        <input type="text" id="testDateTime" readonly>
    </div>

    <div class="record-tabs" id="tabContainer">
        <button class="add-tab" onclick="addNewRecord()">+</button>
    </div>

    <div id="testForm">
        <div class="section-label">카드 구분</div>
        <div class="button-grid triple">
            <button class="item cat-btn" onclick="setVal('category', '체크카드', this)">체크카드</button>
            <button class="item cat-btn" onclick="setVal('category', '신용카드', this)">신용카드</button>
            <button class="item cat-btn" onclick="setVal('category', '듀얼카드', this)">듀얼카드</button>
        </div>

        <div class="section-label">세부분류</div>
        <div class="button-grid">
            <button class="item sub-btn" onclick="setVal('subCategory', 'IC 인서트', this)">IC 인서트</button>
            <button class="item sub-btn" onclick="setVal('subCategory', '실물 NFC', this)">실물 NFC</button>
            <button class="item sub-btn" onclick="setVal('subCategory', 'ApplePay', this)">ApplePay</button>
            <button class="item sub-btn" onclick="setVal('subCategory', 'XiaomiPay', this)">XiaomiPay</button>
            <button class="item sub-btn" onclick="setVal('subCategory', 'HuaweiPay', this)">HuaweiPay</button>
            <button class="item sub-btn" onclick="setVal('subCategory', 'QR CPM', this)">QR CPM</button>
        </div>

        <div class="section-label">금액</div>
        <div class="input-group">
            <div class="amount-wrapper">
                <input type="text" id="amountDisplay" placeholder="0" oninput="formatCurrency(this)">
                <span class="amount-unit">￦</span>
            </div>
        </div>

        <div class="section-label">기능 지원</div>
        <div class="toggle-grid">
            <div class="toggle-row"><span>HotKey(듀얼)</span><button class="toggle-btn" id="hotkey" onclick="toggleOption('hotkey')">N</button></div>
            <div class="toggle-row"><span>Brand(듀얼)</span><button class="toggle-btn" id="brandSelection" onclick="toggleOption('brandSelection')">N</button></div>
            <div class="toggle-row"><span>PIN 출력</span><button class="toggle-btn" id="pinOut" onclick="toggleOption('pinOut')">N</button></div>
            <div class="toggle-row"><span>PinbyPass</span><button class="toggle-btn" id="pinBypass" onclick="toggleOption('pinBypass')">N</button></div>
            <div class="toggle-row"><span>QPS 기능</span><button class="toggle-btn" id="qpsStatus" onclick="toggleOption('qpsStatus')">N</button></div>
            <div class="toggle-row"><span>승인 결과</span><button class="toggle-btn" id="status" onclick="toggleOption('status')">N</button></div>
        </div>

        <div class="section-label">기타사항</div>
        <div class="input-group">
            <textarea id="memo" placeholder="기타 사항을 입력하세요" oninput="setVal('memo', this.value)"></textarea>
        </div>

        <div class="section-label">테스트 카드</div>
        <div id="cardSection">
            <div class="card-list-item"><span>실물체크</span><select class="card-select" id="realCheck" onchange="setCardVal('realCheck', this.value)"><option value="">카드 선택</option></select></div>
            <div class="card-list-item"><span>실물신용</span><select class="card-select" id="realCredit" onchange="setCardVal('realCredit', this.value)"><option value="">카드 선택</option></select></div>
            <div class="card-list-item"><span>실물듀얼</span><select class="card-select" id="realDual" onchange="setCardVal('realDual', this.value)"><option value="">카드 선택</option></select></div>
            <div class="card-list-item"><span>애플</span><select class="card-select" id="apple" onchange="setCardVal('apple', this.value)"><option value="">카드 선택</option></select></div>
            <div class="card-list-item"><span>샤오미</span><select class="card-select" id="xiaomi" onchange="setCardVal('xiaomi', this.value)"><option value="">카드 선택</option></select></div>
            <div class="card-list-item"><span>화웨이</span><select class="card-select" id="huawei" onchange="setCardVal('huawei', this.value)"><option value="">카드 선택</option></select></div>
        </div>
    </div>

    <div class="submit-area" style="display: flex; gap: 10px;">
        <button class="submit-btn" style="background:var(--upi-blue); flex: 1;" onclick="showResultSummary()">결과 확인</button>
        <button class="submit-btn" style="flex: 1;" onclick="saveToExcel()">엑셀 저장</button>
    </div>
</div>

<div id="resultModal" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.8); z-index:1000; overflow-y:auto;">
    <div class="app-container" style="margin: 20px auto; position:relative;">
        <button onclick="closeResult()" style="position:absolute; right:20px; top:20px; border:none; background:none; font-size:20px; cursor:pointer;">✕</button>
        <div class="header-area">
            <img src="Logo.png" alt="UPI" class="header-logo">
            <h2 style="font-size:18px;">테스트 결과 요약</h2>
        </div>
        <div id="summaryContent"></div>
        <div class="submit-area">
            <button class="submit-btn" style="background:var(--upi-blue);" onclick="closeResult()">닫기</button>
        </div>
    </div>
</div>

<script>
    let records = [{ category: '', subCategory: '', amount: '', hotkey: 'N', brandSelection: 'N', pinOut: 'N', pinBypass: 'N', qpsStatus: 'N', status: 'N', memo: '', cards: {} }];
    let currentIdx = 0;

    function setStaticTime() {
        const now = new Date();
        const dateStr = now.getFullYear() + '-' + String(now.getMonth() + 1).padStart(2, '0') + '-' + String(now.getDate()).padStart(2, '0') + ' ' + 
                        String(now.getHours()).padStart(2, '0') + ':' + String(now.getMinutes()).padStart(2, '0') + ':' + String(now.getSeconds()).padStart(2, '0');
        document.getElementById('testDateTime').value = dateStr;
    }

    function formatCurrency(el) {
        let val = el.value.replace(/[^0-9]/g, "");
        if (val && val !== "") {
            val = parseInt(val).toLocaleString('ko-KR');
            el.value = val;
            records[currentIdx].amount = "￦" + val;
        } else { el.value = ""; records[currentIdx].amount = ""; }
    }

    function renderTabs() {
        const container = document.getElementById('tabContainer');
        const addBtn = container.querySelector('.add-tab');
        container.querySelectorAll('.tab-btn').forEach(t => t.remove());
        records.forEach((_, i) => {
            const btn = document.createElement('button');
            btn.className = `tab-btn ${i === currentIdx ? 'active' : ''}`;
            btn.innerText = (i + 1);
            btn.onclick = () => switchTab(i);
            container.insertBefore(btn, addBtn);
        });
    }

    function addNewRecord() {
        records.push({ category: '', subCategory: '', amount: '', hotkey: 'N', brandSelection: 'N', pinOut: 'N', pinBypass: 'N', qpsStatus: 'N', status: 'N', memo: '', cards: {} });
        currentIdx = records.length - 1;
        updateUI();
    }

    function switchTab(idx) { currentIdx = idx; updateUI(); }

    function setVal(key, val, el) {
        records[currentIdx][key] = val;
        if (el && el.tagName === 'BUTTON') {
            const btns = el.parentElement.querySelectorAll('.item');
            btns.forEach(b => b.classList.remove('selected'));
            el.classList.add('selected');
        }
    }

    function setCardVal(cardType, val) { records[currentIdx].cards[cardType] = val; }

    function toggleOption(id) {
        const newVal = records[currentIdx][id] === 'N' ? 'Y' : 'N';
        records[currentIdx][id] = newVal;
        const btn = document.getElementById(id);
        btn.innerText = newVal;
        btn.classList.toggle('active', newVal === 'Y');
    }

    function updateUI() {
        renderTabs();
        const r = records[currentIdx];
        document.querySelectorAll('.cat-btn').forEach(b => b.classList.toggle('selected', b.innerText === r.category));
        document.querySelectorAll('.sub-btn').forEach(b => b.classList.toggle('selected', b.innerText === r.subCategory));
        document.getElementById('amountDisplay').value = (r.amount || "").replace("￦", "");
        document.getElementById('memo').value = r.memo || "";
        ['hotkey', 'brandSelection', 'pinOut', 'pinBypass', 'qpsStatus', 'status'].forEach(id => {
            const btn = document.getElementById(id);
            btn.innerText = r[id];
            btn.classList.toggle('active', r[id] === 'Y');
        });
        const keys = ['realCheck', 'realCredit', 'realDual', 'apple', 'xiaomi', 'huawei'];
        keys.forEach(key => { document.getElementById(key).value = r.cards[key] || ""; });
    }

    // 결과 요약 보기 기능 추가
    function showResultSummary() {
        const storeName = document.getElementById('storeName').value || "미입력";
        const testDate = document.getElementById('testDateTime').value;
        const modal = document.getElementById('resultModal');
        const content = document.getElementById('summaryContent');

        content.innerHTML = `
            <div class="summary-row"><b>가맹점명</b> <span>[ ${storeName} ]</span></div>
            <div class="summary-row"><b>테스트 일시</b> <span>[ ${testDate} ]</span></div>
            <div class="summary-tabs" id="summaryTabList"></div>
            <div id="summaryDetail" class="result-card"></div>
        `;
        
        const tabList = document.getElementById('summaryTabList');
        records.forEach((_, i) => {
            const btn = document.createElement('button');
            btn.className = 'tab-btn';
            btn.style.width = '35px'; btn.style.height = '35px';
            btn.innerText = (i + 1);
            btn.onclick = () => updateSummaryDetail(i);
            tabList.appendChild(btn);
        });

        updateSummaryDetail(0);
        modal.style.display = 'block';
    }

   function updateSummaryDetail(idx) {
        const r = records[idx];
        const detail = document.getElementById('summaryDetail');
        
        // 탭 활성화 표시 업데이트
        document.querySelectorAll('#summaryTabList .tab-btn').forEach((b, i) => {
            b.classList.toggle('active', i === idx);
        });

        // 결과 화면 구성 (기능 지원 항목 2열 배치)
        detail.innerHTML = `
            <div class="summary-row"><b>카드구분</b> <span>[ ${r.category || '-'} ]</span></div>
            <div class="summary-row"><b>세부분류</b> <span>[ ${r.subCategory || '-'} ]</span></div>
            <div class="summary-row"><b>금액</b> <span>[ ${r.amount || '￦0'} ]</span></div>
            
            <div style="margin-top: 15px; display: grid; grid-template-columns: 1fr 1fr; gap: 10px;">
                <div class="summary-row" style="border-bottom:none; padding:5px 0;"><b>Hotkey</b> <span>[ ${r.hotkey} ]</span></div>
                <div class="summary-row" style="border-bottom:none; padding:5px 0;"><b>Brand Selection</b> <span>[ ${r.brandSelection} ]</span></div>
                
                <div class="summary-row" style="border-bottom:none; padding:5px 0;"><b>Pin</b> <span>[ ${r.pinOut} ]</span></div>
                <div class="summary-row" style="border-bottom:none; padding:5px 0;"><b>PinbyPass</b> <span>[ ${r.pinBypass} ]</span></div>
                
                <div class="summary-row" style="border-bottom:none; padding:5px 0;"><b>QPS</b> <span>[ ${r.qpsStatus} ]</span></div>
                <div class="summary-row" style="border-bottom:none; padding:5px 0;"><b>승인</b> <span>[ ${r.status} ]</span></div>
            </div>

            <div style="margin-top:15px; padding-top:10px; border-top:1px solid #eee;">
                <b style="font-size:13px; color:var(--upi-blue);">기타사항:</b>
                <div style="margin-top:5px; font-size:13px; color:#666; line-height:1.4;">${r.memo || '없음'}</div>
            </div>
        `;
    }

    function closeResult() {
        document.getElementById('resultModal').style.display = 'none';
    }

    function saveToExcel() {
        const storeName = document.getElementById('storeName').value;
        const testDate = document.getElementById('testDateTime').value;
        if(!storeName) { alert("가맹점명을 입력해주세요."); return; }

        const headers = [
            "Number", "Date", "Merchant", "MID", "Merchant Name in UPI system", 
            "Acquirer", "Acquirer IIN", "VAN", "MIS", "Terminal Model", 
            "Self-service terminal/staffed counter", "Which card reader?", 
            "Card Number", "Card Type", "Transaction Amount", "Transaction Type", 
            "NFC Type", "With/without hotkey?", "Terminal Request PIN？", 
            "PIN Bypass support?", "Successful/ Failed?", "Test result - Description", 
            "Problem Followup"
        ];

        const dataRows = records.map((r, i) => [
            i + 1, testDate.split(' ')[0], storeName, "", "", "", "", "", "", "", "", "", "",
            r.category, r.amount, r.subCategory, "", r.hotkey, r.pinOut, r.pinBypass, r.status, r.memo, ""
        ]);

        const worksheet = XLSX.utils.aoa_to_sheet([headers, ...dataRows]);
        const workbook = XLSX.utils.book_new();
        XLSX.utils.book_append_sheet(workbook, worksheet, "TestResults");

        const fileName = `${storeName}_테스트결과_${testDate.replace(/:/g, '-')}.xlsx`;
        XLSX.writeFile(workbook, fileName);
    }

    setStaticTime();
    renderTabs();
</script>
</body>
</html>
